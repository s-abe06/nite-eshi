<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニセ絵師を探せ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
  :root{--bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;--accent2:#f5a623;--text:#eaeaea;--text-sub:#a0a8c0;--radius:16px;--shadow:0 8px 32px rgba(0,0,0,0.4);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  header{width:100%;padding:14px 20px;background:var(--surface);border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  header h1{font-size:1.05rem;font-weight:900;color:var(--accent);}
  .round-badge{background:var(--accent);color:#fff;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;display:none;}
  .room-badge{background:var(--card);color:var(--accent2);font-size:0.78rem;font-weight:900;padding:4px 12px;border-radius:20px;letter-spacing:0.1em;display:none;}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  main{width:100%;max-width:900px;padding:20px 16px;flex:1;}
  .card{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid rgba(255,255,255,0.06);}
  .card h2{font-size:1.05rem;font-weight:700;color:var(--accent2);margin-bottom:14px;}
  .btn{display:inline-block;padding:12px 24px;border-radius:12px;border:none;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:transform 0.1s,opacity 0.2s;}
  .btn:active{transform:scale(0.97);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-secondary{background:var(--card);color:var(--text);}
  .btn-warning{background:var(--accent2);color:#fff;}
  .btn-sm{padding:6px 14px;font-size:0.82rem;border-radius:10px;}
  input[type="text"]{width:100%;padding:12px 16px;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:var(--card);color:var(--text);font-family:inherit;font-size:1rem;outline:none;transition:border-color 0.2s;}
  input[type="text"]:focus{border-color:var(--accent);}
  .player-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:24px;background:var(--card);font-size:0.9rem;font-weight:700;margin:4px;}
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .theme-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,166,35,0.15);border:2px solid var(--accent2);color:var(--accent2);padding:8px 16px;border-radius:12px;font-size:1rem;font-weight:900;margin-bottom:10px;}
  .topic-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(233,69,96,0.15);border:2px solid var(--accent);color:var(--accent);padding:8px 16px;border-radius:12px;font-size:1.3rem;font-weight:900;}
  .fake-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(155,89,182,0.15);border:2px solid #9b59b6;color:#9b59b6;padding:8px 16px;border-radius:12px;font-size:1rem;font-weight:900;}
  #canvas-wrapper{position:relative;width:100%;aspect-ratio:4/3;background:#fff;border-radius:12px;overflow:hidden;cursor:crosshair;box-shadow:0 4px 24px rgba(0,0,0,0.5);touch-action:none;}
  #canvas-wrapper canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
  #canvas-wrapper.readonly{cursor:default;}
  .turn-info{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:var(--card);margin-bottom:10px;font-weight:700;}
  .draw-counts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .dci{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;background:var(--card);font-size:0.8rem;}
  .pip{width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);}
  .vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:12px;}
  .vote-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px;border-radius:14px;border:2px solid rgba(255,255,255,0.1);background:var(--card);color:var(--text);font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer;transition:border-color 0.2s,transform 0.1s;}
  .vote-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
  .vote-btn.selected{border-color:var(--accent);background:rgba(233,69,96,0.15);}
  .vote-dot{width:28px;height:28px;border-radius:50%;}
  .result-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:var(--card);margin-bottom:8px;}
  .vote-bar{height:8px;border-radius:4px;min-width:4px;}
  .score-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--card);margin-bottom:6px;}
  .waiting{color:var(--text-sub);font-size:0.9rem;padding:12px;text-align:center;}
  .label{font-size:0.75rem;color:var(--text-sub);font-weight:700;letter-spacing:0.05em;margin-bottom:6px;}
  .color-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .cli{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--card);border-radius:20px;font-size:0.82rem;font-weight:700;}
  #toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);opacity:0;background:rgba(15,52,96,0.97);color:var(--text);padding:20px 36px;border-radius:20px;font-weight:900;font-size:1.2rem;box-shadow:var(--shadow);transition:transform 0.25s,opacity 0.25s;z-index:300;white-space:nowrap;border:2px solid var(--accent);pointer-events:none;text-align:center;}
  #toast.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
  #role-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:20px;text-align:center;padding:24px;}
  #role-overlay.show{display:flex;}
  .role-card{background:var(--surface);border-radius:20px;padding:28px 36px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.1);max-width:340px;width:100%;}
  .spectator-bar{background:rgba(155,89,182,0.15);border:2px solid #9b59b6;border-radius:12px;padding:10px 16px;text-align:center;color:#9b59b6;font-weight:700;font-size:0.9rem;margin-bottom:12px;}
  .settings-grid{display:flex;flex-direction:column;gap:16px;}
  .setting-row{display:flex;flex-direction:column;gap:6px;}
  .setting-btns{display:flex;gap:8px;flex-wrap:wrap;}
</style>
</head>
<body>
<header>
  <h1>🎨 ニセ絵師を探せ</h1>
  <span id="round-badge" class="round-badge"></span>
  <span id="room-badge" class="room-badge"></span>
  <div class="header-right">
    <button id="header-dissolve-btn" onclick="doDissolveRoom()" style="display:none;padding:6px 14px;border-radius:10px;border:1px solid var(--accent);background:rgba(233,69,96,0.15);color:var(--accent);font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer">💥 解散</button>
  </div>
</header>
<div id="role-overlay">
  <h2 style="color:var(--accent2);font-weight:900;">あなたの役割</h2>
  <div class="role-card" id="role-card-content"></div>
  <button class="btn btn-primary" onclick="closeRoleOverlay()">確認しました！</button>
</div>
<main id="app">
  <!-- 初期画面はJSで描画 -->
</main>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://fake-artist-d81b1-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

// ===== お題リスト =====
const TOPICS = {
  "動物":["ライオン","ゾウ","キリン","ペンギン","コアラ","パンダ","シマウマ","カバ","フラミンゴ","タコ","クジラ","イルカ","カメレオン","ハリネズミ","ナマケモノ"],
  "食べ物":["ラーメン","ピザ","寿司","タコス","パンケーキ","アイスクリーム","たこ焼き","カレー","ハンバーガー","おにぎり","クレープ","餃子","プリン","パスタ","チョコレート"],
  "乗り物":["新幹線","ヘリコプター","ヨット","ロケット","消防車","潜水艦","トラクター","ケーブルカー","熱気球","スペースシャトル","リムジン","自転車","パトカー","フォークリフト","モノレール"],
  "スポーツ":["サッカー","バスケットボール","テニス","水泳","柔道","スキー","ボクシング","バレーボール","卓球","ゴルフ","アーチェリー","フェンシング","スケートボード","ラグビー","野球"],
  "建物・場所":["城","灯台","図書館","水族館","観覧車","神社","病院","スタジアム","温泉","プラネタリウム","駅","空港","遊園地","博物館","ピラミッド"],
  "自然・天気":["虹","雷","台風","オーロラ","火山","滝","砂漠","氷河","珊瑚礁","洞窟","竜巻","霧","吹雪","干ばつ","流れ星"],
  "道具・家電":["掃除機","電子レンジ","扇風機","アイロン","炊飯器","ドライヤー","冷蔵庫","洗濯機","電話","テレビ","ミシン","湯たんぽ","目覚まし時計","電卓","カメラ"],
  "職業":["医者","消防士","料理人","パイロット","宇宙飛行士","忍者","魔法使い","探偵","農家","漁師","音楽家","画家","大工","警察官","美容師"],
  "海の生き物":["クラゲ","ウツボ","ナマコ","シャチ","マンタ","ヒトデ","アンコウ","タツノオトシゴ","ウミガメ","ヤドカリ","ウニ","カニ","ロブスター","クリオネ","シロナガスクジラ"],
  "昆虫・小動物":["カブトムシ","ホタル","カマキリ","アリ","ミツバチ","チョウ","バッタ","テントウムシ","ムカデ","クモ","リス","モグラ","カエル","ヤモリ","イモリ"],
  "ファンタジー":["ドラゴン","ユニコーン","人魚","天使","悪魔","ゾンビ","エルフ","ドワーフ","フェニックス","ゴブリン","スライム","狼男","吸血鬼","巨人","ケンタウロス"],
  "日用品":["歯ブラシ","傘","リュック","水筒","メガネ","ハサミ","財布","鉛筆","定規","消しゴム","ホッチキス","クリップ","ポスト","南京錠","コンパス"],
};
const COLORS = ["#E74C3C","#3498DB","#2ECC71","#F39C12","#9B59B6","#1ABC9C","#E67E22","#E91E90","#00BCD4","#8BC34A"];
const ALL_CATS = Object.keys(TOPICS);

// ===== ローカル状態 =====
let playerId = localStorage.getItem("fa_pid") || ("p_" + Math.random().toString(36).slice(2,10));
localStorage.setItem("fa_pid", playerId);
let playerName = "";
let currentRoom = "";   // 現在のルームコード
let isSpectator = false;
let gameState = null;
let myVote = null;
let isDrawing = false;
let localPoints = [];
let roleShown = false;
let mainCanvas = null;
let ctx = null;
let listening = false;
let heartbeatTimer = null;
let turnTimerInterval = null;
let lastNotifiedTurnIndex = -1;

const HEARTBEAT_INTERVAL = 30 * 1000;
const LOBBY_TIMEOUT = 60 * 60 * 1000;
const GAME_TIMEOUT = 90 * 1000;
const ROOM_IDLE_TIMEOUT = 90 * 1000;

// ===== Firebaseパス =====
function roomRef(path) { return ref(db, `rooms/${currentRoom}${path ? '/'+path : ''}`); }

// ===== データ正規化 =====
function toArr(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.values(val);
}

function normalize(val) {
  const s = val || {};
  return {
    phase:            s.phase || "lobby",
    round:            s.round || 0,
    players:          toArr(s.players),
    spectators:       toArr(s.spectators),
    roles:            s.roles || {},
    theme:            s.theme || "",
    topic:            s.topic || "",
    drawOrder:        toArr(s.drawOrder),
    currentTurnIndex: s.currentTurnIndex || 0,
    turnCounts:       s.turnCounts || {},
    strokes:          toArr(s.strokes),
    votes:            s.votes || {},
    voteResult:       s.voteResult || null,
    fakeGuess:        s.fakeGuess !== undefined ? s.fakeGuess : null,
    fakeGuessCorrect: s.fakeGuessCorrect !== undefined ? s.fakeGuessCorrect : null,
    judgeId:          s.judgeId || null,
    away:             s.away || {},
    settings: {
      awayTimeout:  s.settings?.awayTimeout !== undefined ? s.settings.awayTimeout : true,
      drawCount:    s.settings?.drawCount    || 0,
      turnTime:     s.settings?.turnTime     || 0,
      totalRounds:  s.settings?.totalRounds  || 0,
      categories:   s.settings?.categories   || [],
      fakeCount:    s.settings?.fakeCount    || 1,
    },
  };
}

async function fbGet() {
  const snap = await get(roomRef("state"));
  return normalize(snap.val());
}
async function fbSet(s) { await set(roomRef("state"), s); }
async function fbUpdate(u) { await update(roomRef("state"), u); }
async function fbAddPlayer(player) { await push(roomRef("state/players"), player); }
async function fbAddStroke(stroke) { await push(roomRef("state/strokes"), stroke); }

// ===== ルームコード生成 =====
function genRoomCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ===== Firebase監視 =====
function startListening() {
  if (listening) return;
  listening = true;
  onValue(roomRef("state"), snap => {
    const prev = gameState ? gameState.phase : null;
    gameState = normalize(snap.val());
    if (prev !== "drawing" && gameState.phase === "drawing") {
      roleShown = false;
      if (!isSpectator) setTimeout(showRoleOverlay, 400);
    }
    updateHeader();
    renderApp();
  });
}

function updateHeader() {
  const rb = document.getElementById("round-badge");
  const roomB = document.getElementById("room-badge");
  const dissolveBtn = document.getElementById("header-dissolve-btn");
  if (rb) { rb.style.display = gameState&&gameState.round>0?"inline":"none"; if(gameState) rb.textContent=`ラウンド ${gameState.round}`; }
  if (roomB) { roomB.style.display = currentRoom?"inline":"none"; roomB.textContent=`🔑 ${currentRoom}`; }
  if (dissolveBtn) {
    const isHost = gameState&&gameState.players&&gameState.players.length>0&&gameState.players[0].id===playerId;
    dissolveBtn.style.display = isHost?"inline-block":"none";
  }
}

// ===== ハートビート =====
function startHeartbeat() {
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  sendHeartbeat();
  heartbeatTimer = setInterval(sendHeartbeat, HEARTBEAT_INTERVAL);
}
async function sendHeartbeat() {
  if (!playerName || !currentRoom) return;
  await update(ref(db, `rooms/${currentRoom}/presence/${playerId}`), { lastSeen: Date.now(), name: playerName });
}
async function setupDisconnect() {
  const presRef = ref(db, `rooms/${currentRoom}/presence/${playerId}`);
  await onDisconnect(presRef).remove();
}
function startPresenceWatch() {
  setInterval(checkPresence, 30 * 1000);
  checkPresence();
}
async function checkPresence() {
  if (!currentRoom) return;
  const snap = await get(ref(db, `rooms/${currentRoom}/presence`));
  const presence = snap.val() || {};
  const now = Date.now();
  const state = await fbGet();
  if (Object.keys(presence).length > 0) {
    const allIdle = Object.values(presence).every(p => (now-(p.lastSeen||0)) > ROOM_IDLE_TIMEOUT);
    if (allIdle) { await dissolveRoomData(); location.reload(); return; }
  }
  for (const pid of Object.keys(presence)) {
    const elapsed = now - (presence[pid].lastSeen||0);
    if (state.phase === "lobby") {
      if (elapsed > LOBBY_TIMEOUT) {
        await removePlayer(pid);
        await update(ref(db, `rooms/${currentRoom}/presence`), { [pid]: null });
      }
    } else {
      if (state.settings.awayTimeout) {
        const isAway = elapsed > GAME_TIMEOUT;
        await update(roomRef("state/away"), { [pid]: isAway||null });
      }
    }
  }
}
async function removePlayer(pid) {
  const state = await fbGet();
  const players = state.players.filter(p => p.id !== pid);
  if (players.length === 0) { await dissolveRoomData(); return; }
  const obj = {}; players.forEach((p,i) => { obj[i]=p; });
  await update(roomRef("state"), { players: obj });
}
async function dissolveRoomData() {
  await set(ref(db, `rooms/${currentRoom}`), null);
}

// ===== 解散 =====
window.doDissolveRoom = async function() {
  if (!confirm("ルームを解散しますか？")) return;
  await dissolveRoomData();
  location.reload();
};

// ===== 初期画面 =====
function renderApp() {
  if (!playerName) { renderStart(); return; }
  if (!gameState) return;
  if (gameState.phase !== "drawing") {
    if (turnTimerInterval) { clearInterval(turnTimerInterval); turnTimerInterval = null; }
  }
  updateHeader();
  if (isSpectator) { renderSpectator(); return; }
  switch (gameState.phase) {
    case "lobby":   renderLobby(); break;
    case "drawing": renderDrawing(); break;
    case "voting":  renderVoting(); break;
    case "result":  renderResult(); break;
    case "final":   renderFinal(); break;
    case "end":     renderEnd(); break;
    default:        renderLobby(); break;
  }
}

// ===== 開始画面 =====
function renderStart() {
  document.getElementById("app").innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px">
      <div style="font-size:3rem">🎨</div>
      <h2 style="font-size:1.6rem;font-weight:900;color:var(--accent)">ニセ絵師を探せ</h2>
      <p style="color:var(--text-sub);text-align:center">みんなで一筆ずつ絵を描いて<br>ニセ絵師を見つけ出せ！</p>
      <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px">
        <div class="label">あなたの名前</div>
        <input type="text" id="name-input" placeholder="名前を入力" maxlength="12">
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" style="flex:1" onclick="doCreateRoom()">🏠 ルーム作成</button>
          <button class="btn btn-secondary" style="flex:1" onclick="showJoinForm()">🚪 ルーム参加</button>
        </div>
        <div id="join-form" style="display:none;flex-direction:column;gap:10px">
          <div class="label">ルームコードを入力</div>
          <input type="text" id="room-code-input" placeholder="例：X7K2" maxlength="4" style="text-transform:uppercase;letter-spacing:0.2em;font-size:1.2rem;text-align:center">
          <button class="btn btn-warning" onclick="doJoinRoom()">参加する</button>
        </div>
      </div>
    </div>`;
  document.getElementById("name-input").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("room-code-input") ? doJoinRoom() : doCreateRoom(); });
}

window.showJoinForm = function() {
  const f = document.getElementById("join-form");
  if (f) { f.style.display = f.style.display==="none" ? "flex" : "none"; }
};

// ===== ルーム作成 =====
window.doCreateRoom = async function() {
  const name = (document.getElementById("name-input")?.value||"").trim();
  if (!name) { showToast("名前を入力してください"); return; }
  playerName = name;
  isSpectator = false;

  // ユニークなルームコードを生成
  let code = "";
  for (let i = 0; i < 10; i++) {
    code = genRoomCode();
    const snap = await get(ref(db, `rooms/${code}`));
    if (!snap.exists()) break;
  }
  currentRoom = code;

  // 初期状態をFirebaseに作成
  await set(ref(db, `rooms/${currentRoom}/state`), {
    phase: "lobby", round: 0,
    settings: { awayTimeout:true, drawCount:0, turnTime:0, totalRounds:0, categories:[], fakeCount:1 }
  });

  await fbAddPlayer({ id:playerId, name, color:COLORS[0], score:0 });
  await update(ref(db, `rooms/${currentRoom}/presence/${playerId}`), { lastSeen:Date.now(), name });
  await onDisconnect(ref(db, `rooms/${currentRoom}/presence/${playerId}`)).remove();

  startListening();
  startHeartbeat();
  startPresenceWatch();
  renderApp();
};

// ===== ルーム参加 =====
window.doJoinRoom = async function() {
  const name = (document.getElementById("name-input")?.value||"").trim();
  const code = (document.getElementById("room-code-input")?.value||"").trim().toUpperCase();
  if (!name) { showToast("名前を入力してください"); return; }
  if (code.length !== 4) { showToast("ルームコードは4文字です"); return; }

  const snap = await get(ref(db, `rooms/${code}/state`));
  if (!snap.exists()) { showToast("ルームが見つかりません"); return; }

  const state = normalize(snap.val());
  playerName = name;
  currentRoom = code;

  if (state.phase !== "lobby") {
    // ゲーム中 → 観戦者として参加
    isSpectator = true;
    await push(ref(db, `rooms/${currentRoom}/state/spectators`), { id:playerId, name });
    showToast("観戦モードで参加しました");
  } else {
    isSpectator = false;
    const already = state.players.find(p => p.id===playerId);
    if (!already) {
      const colorIndex = state.players.length % COLORS.length;
      await fbAddPlayer({ id:playerId, name, color:COLORS[colorIndex], score:0 });
    }
  }

window.doStartGame = async function() {
  myVote = null; lastNotifiedTurnIndex = -1;
  const state = await fbGet();
  if (state.players.length<3) return;
  const s = state.settings;
  const useCats = (s.categories&&s.categories.length>0)?s.categories.filter(c=>TOPICS[c]):Object.keys(TOPICS);
  const theme = useCats[Math.floor(Math.random()*useCats.length)];
  const topic = TOPICS[theme][Math.floor(Math.random()*TOPICS[theme].length)];
  const fakeCount = Math.min(s.fakeCount||1, state.players.length-2);
  const shuffledIdx = shuffle([...Array(state.players.length).keys()]);
  const fakeIdxList = shuffledIdx.slice(0,fakeCount);
  const roles = {};
  state.players.forEach((p,i) => { roles[p.id] = fakeIdxList.includes(i)?"fake":"real"; });
  const realPlayers = state.players.filter(p=>roles[p.id]==="real");
  const judgeId = realPlayers[Math.floor(Math.random()*realPlayers.length)].id;
  const drawOrder = shuffle(state.players.map(p=>p.id));
  const turnCounts = {};
  state.players.forEach(p => { turnCounts[p.id]=0; });
  await fbUpdate({ phase:"drawing", theme, topic, roles, judgeId, drawOrder, currentTurnIndex:0, turnCounts, strokes:null, votes:null, voteResult:null, fakeGuess:null, fakeGuessCorrect:null, round:(state.round||0)+1 });
};

// ===== キャンバス =====
function initCanvas(isMyTurn) {
  const wrapper = document.getElementById("canvas-wrapper");
  mainCanvas = document.getElementById("main-canvas");
  if (!wrapper||!mainCanvas) return;
  const rect = wrapper.getBoundingClientRect();
  const W = Math.floor(rect.width), H = Math.floor(rect.height);
  mainCanvas.width=W; mainCanvas.height=H;
  mainCanvas.style.width=W+"px"; mainCanvas.style.height=H+"px";
  ctx = mainCanvas.getContext("2d");
  redrawStrokes();
  if (!isMyTurn) return;
  const me = gameState.players.find(p=>p.id===playerId);
  const myColor = me?me.color:"#E74C3C";
  function getPos(e) {
    const rect=mainCanvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return { x:(src.clientX-rect.left)/rect.width, y:(src.clientY-rect.top)/rect.height };
  }
  function onStart(e) {
    e.preventDefault();
    if (isDrawing) return;
    if (gameState.drawOrder[gameState.currentTurnIndex]!==playerId) return;
    isDrawing=true; localPoints=[];
    const pt=getPos(e); localPoints.push(pt);
    const W=mainCanvas.width, H=mainCanvas.height;
    ctx.beginPath(); ctx.arc(pt.x*W,pt.y*H,2,0,Math.PI*2); ctx.fillStyle=myColor; ctx.fill();
  }
  function onMove(e) {
    e.preventDefault(); if(!isDrawing) return;
    const pt=getPos(e), prev=localPoints[localPoints.length-1];
    localPoints.push(pt);
    const W=mainCanvas.width, H=mainCanvas.height;
    ctx.beginPath(); ctx.moveTo(prev.x*W,prev.y*H); ctx.lineTo(pt.x*W,pt.y*H);
    ctx.strokeStyle=myColor; ctx.lineWidth=4; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.stroke();
  }
  async function onEnd(e) {
    e.preventDefault(); if(!isDrawing) return; isDrawing=false;
    if (localPoints.length===0) return;
    await fbAddStroke({ playerId, color:myColor, points:localPoints });
    const state=await fbGet();
    const turnCounts={...state.turnCounts};
    turnCounts[playerId]=(turnCounts[playerId]||0)+1;
    const maxTurns=state.settings.drawCount>0?state.settings.drawCount:(state.players.length<=4?3:2);
    const allDone=state.players.every(p=>(turnCounts[p.id]||0)>=maxTurns);
    if (allDone) { await fbUpdate({turnCounts,phase:"voting"}); }
    else {
      let next=(state.currentTurnIndex+1)%state.drawOrder.length;
      for(let i=0;i<state.drawOrder.length;i++){if((turnCounts[state.drawOrder[next]]||0)<maxTurns)break;next=(next+1)%state.drawOrder.length;}
      await fbUpdate({turnCounts,currentTurnIndex:next});
    }
    localPoints=[];
  }
  mainCanvas.addEventListener("mousedown",onStart);
  mainCanvas.addEventListener("mousemove",onMove);
  mainCanvas.addEventListener("mouseup",onEnd);
  mainCanvas.addEventListener("mouseleave",onEnd);
  mainCanvas.addEventListener("touchstart",onStart,{passive:false});
  mainCanvas.addEventListener("touchmove",onMove,{passive:false});
  mainCanvas.addEventListener("touchend",onEnd,{passive:false});
}

function redrawStrokes() {
  if(!ctx||!mainCanvas) return;
  const W=mainCanvas.width, H=mainCanvas.height;
  ctx.clearRect(0,0,W,H);
  gameState.strokes.forEach(s=>{
    if(!s||!s.points) return;
    const pts=toArr(s.points);
    if(pts.length<1) return;
    ctx.beginPath();
    if(pts.length===1){ctx.arc(pts[0].x*W,pts[0].y*H,2,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();return;}
    ctx.moveTo(pts[0].x*W,pts[0].y*H);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x*W,pts[i].y*H);
    ctx.strokeStyle=s.color;ctx.lineWidth=4;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();
  });
}

let turnTimerInterval2 = null;
function startTurnTimer(isMyTurn) {
  if (turnTimerInterval2) clearInterval(turnTimerInterval2);
  let remaining = gameState.settings.turnTime;
  turnTimerInterval2 = setInterval(async()=>{
    remaining--;
    const el=document.getElementById("timer-count");
    if(el){el.textContent=remaining;el.parentElement.style.color=remaining<=5?"var(--accent)":"var(--accent2)";}
    if(remaining<=0){
      clearInterval(turnTimerInterval2); turnTimerInterval2=null;
      if(isMyTurn&&gameState&&gameState.phase==="drawing"&&gameState.drawOrder[gameState.currentTurnIndex]===playerId){
        const state=await fbGet(); if(state.phase!=="drawing") return;
        const turnCounts={...state.turnCounts};
        turnCounts[playerId]=(turnCounts[playerId]||0)+1;
        const maxTurns=state.settings.drawCount>0?state.settings.drawCount:(state.players.length<=4?3:2);
        const allDone=state.players.every(p=>(turnCounts[p.id]||0)>=maxTurns);
        if(allDone){await fbUpdate({turnCounts,phase:"voting"});}
        else{let next=(state.currentTurnIndex+1)%state.drawOrder.length;for(let i=0;i<state.drawOrder.length;i++){if((turnCounts[state.drawOrder[next]]||0)<maxTurns)break;next=(next+1)%state.drawOrder.length;}await fbUpdate({turnCounts,currentTurnIndex:next});}
      }
    }
  },1000);
}

          <div style="font-size:1.1rem;font-weight:900;color:var(--accent)">🎯 ニセ絵師（${esc(fakeP?.name||"？")}）が最多票！お題を当てると逆転…</div>
        </div>
        ${gameState.fakeGuess!==null?`
          <div style="background:rgba(245,166,35,0.1);border:2px solid var(--accent2);border-radius:12px;padding:14px;margin-bottom:14px;text-align:center">
            <div class="label">ニセ絵師の回答</div>
            <div style="font-size:1.4rem;font-weight:900;color:var(--accent2)">「${esc(gameState.fakeGuess)}」</div>
          </div>
          ${iAmJudge?`
            <div style="color:var(--text-sub);font-size:0.85rem;margin-bottom:10px">お題は「<span style="color:var(--accent);font-weight:900">${esc(gameState.topic)}</span>」です</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn" style="background:#2ecc71;color:#fff" onclick="doJudge(true)">⭕ 正解！（ニセ絵師の逆転勝ち）</button>
              <button class="btn btn-primary" onclick="doJudge(false)">✕ 不正解（本物の絵師の勝ち）</button>
            </div>`
          :`<p class="waiting">判定者（${esc(judgeName)}）が正誤を判定中…</p>`}
        `:`
          ${iAmFake?`
            <div style="background:rgba(245,166,35,0.1);border:2px solid var(--accent2);border-radius:12px;padding:14px;margin-bottom:14px">
              <div class="label" style="margin-bottom:6px">お題を入力してください</div>
              <div style="color:var(--text-sub);font-size:0.85rem;margin-bottom:10px">回答は全員に共有され、判定者（${esc(judgeName)}）が正誤を判定します</div>
              <div style="display:flex;gap:8px"><input type="text" id="guess-input" placeholder="お題を入力" maxlength="20"><button class="btn btn-warning" onclick="doSubmitGuess()" style="white-space:nowrap">回答する</button></div>
            </div>`
          :`<p class="waiting">ニセ絵師（${esc(fakeP?.name||"？")}）が回答を入力中…</p>`}`}
      `:`
        <div style="background:rgba(155,89,182,0.1);border:2px solid #9b59b6;border-radius:12px;padding:14px;margin-bottom:14px;text-align:center">
          <div style="font-size:1.1rem;font-weight:900;color:#9b59b6">🕵️ ニセ絵師がバレなかった！</div>
        </div>
        ${isHost?`<button class="btn btn-secondary" onclick="doFakeWins()">ニセ絵師の勝ちを確定する</button>`:`<p class="waiting">結果確定待ち…</p>`}`}
    </div>`;
}

window.doSubmitGuess = async function() {
  const input=document.getElementById("guess-input");
  if(!input||!input.value.trim()){showToast("お題を入力してください");return;}
  await fbUpdate({fakeGuess:input.value.trim(),phase:"result"});
};
window.doJudge = async function(correct) {
  const state=await fbGet();
  const fakeId=Object.keys(state.roles).find(id=>state.roles[id]==="fake");
  const players=state.players.map(p=>{
    if(correct&&p.id===fakeId) return{...p,score:(p.score||0)+2};
    if(!correct&&state.roles[p.id]==="real") return{...p,score:(p.score||0)+1};
    return p;
  });
  await fbUpdate({fakeGuessCorrect:correct,phase:"final",players});
};
window.doFakeWins = async function() {
  const state=await fbGet();
  const fakeId=Object.keys(state.roles).find(id=>state.roles[id]==="fake");
  const players=state.players.map(p=>p.id===fakeId?{...p,score:(p.score||0)+2}:p);
  await fbUpdate({phase:"final",players});
};

// ===== 最終結果 =====
function renderFinal() {
  const app = document.getElementById("app");
  const vr=gameState.voteResult;
  const fakeP=gameState.players.find(p=>p.id===vr?.fakeId);
  let out="";
  if(vr?.fakeIsTop){
    out=gameState.fakeGuessCorrect
      ?`<div style="text-align:center;margin-bottom:20px"><div style="font-size:3rem">🎉</div><div style="font-size:1.3rem;font-weight:900;color:#9b59b6;margin-top:8px">ニセ絵師の逆転勝利！</div><div style="color:var(--text-sub);margin-top:4px">お題「${esc(gameState.topic)}」を当てました！</div></div>`
      :`<div style="text-align:center;margin-bottom:20px"><div style="font-size:3rem">🎨</div><div style="font-size:1.3rem;font-weight:900;color:#2ecc71;margin-top:8px">本物の絵師の勝利！</div><div style="color:var(--text-sub);margin-top:4px">お題は「${esc(gameState.topic)}」でした</div></div>`;
  } else {
    out=`<div style="text-align:center;margin-bottom:20px"><div style="font-size:3rem">🕵️</div><div style="font-size:1.3rem;font-weight:900;color:#9b59b6;margin-top:8px">ニセ絵師の勝利！</div><div style="color:var(--text-sub);margin-top:4px">ニセ絵師は${esc(fakeP?.name||"？")}でした！お題は「${esc(gameState.topic)}」</div></div>`;
  }
  const isHost=gameState.players[0]?.id===playerId;
  app.innerHTML=`
    <div class="card">
      <h2>🏆 ラウンド終了</h2>${out}
      <div style="margin-bottom:20px">
        <div class="label" style="margin-bottom:8px">完成した絵</div>
        <div id="canvas-wrapper" style="cursor:default"><canvas id="main-canvas"></canvas></div>
        <div class="color-legend" style="margin-top:8px">${gameState.players.map(p=>`<div class="cli"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="${p.color}" stroke-width="4" stroke-linecap="round"/></svg>${esc(p.name)}${p.id===playerId?'<span style="color:var(--text-sub);font-size:0.72rem">（あなた）</span>':""}</div>`).join("")}</div>
      </div>
      ${scoreCard()}
      <div style="margin-top:18px">${isHost?`<button class="btn btn-primary" onclick="doNextRound()">次のラウンドへ →</button>`:`<p class="waiting">ホストが次のラウンドを始めるのを待っています…</p>`}</div>
    </div>`;
  setTimeout(()=>{
    const w=document.getElementById("canvas-wrapper"); mainCanvas=document.getElementById("main-canvas");
    if(!w||!mainCanvas) return;
    const rect=w.getBoundingClientRect();
    mainCanvas.width=rect.width; mainCanvas.height=rect.height;
    mainCanvas.style.width=rect.width+"px"; mainCanvas.style.height=rect.height+"px";
    ctx=mainCanvas.getContext("2d"); redrawStrokes();
  },80);
}

window.doNextRound = async function() {
  myVote=null; lastNotifiedTurnIndex=-1;
  const state=await fbGet();
  if(state.settings.totalRounds>0&&state.round>=state.settings.totalRounds){await fbUpdate({phase:"end"});return;}
  await set(roomRef("state/votes"),null); await set(roomRef("state/voteResult"),null);
  await set(roomRef("state/strokes"),null); await set(roomRef("state/roles"),null);
  await set(roomRef("state/judgeId"),null); await set(roomRef("state/drawOrder"),null);
  await set(roomRef("state/turnCounts"),null); await set(roomRef("state/fakeGuess"),null);
  await set(roomRef("state/fakeGuessCorrect"),null); await set(roomRef("state/away"),null);
  if(state.settings.totalRounds>0){
    const s=state.settings;
    const useCats=(s.categories&&s.categories.length>0)?s.categories.filter(c=>TOPICS[c]):Object.keys(TOPICS);
    const theme=useCats[Math.floor(Math.random()*useCats.length)];
    const topic=TOPICS[theme][Math.floor(Math.random()*TOPICS[theme].length)];
    const fakeCount=Math.min(s.fakeCount||1,state.players.length-2);
    const shuffledIdx=shuffle([...Array(state.players.length).keys()]);
    const fakeIdxList=shuffledIdx.slice(0,fakeCount);
    const roles={};
    state.players.forEach((p,i)=>{roles[p.id]=fakeIdxList.includes(i)?"fake":"real";});
    const realPlayers=state.players.filter(p=>roles[p.id]==="real");
    const judgeId=realPlayers[Math.floor(Math.random()*realPlayers.length)].id;
    const drawOrder=shuffle(state.players.map(p=>p.id));
    const turnCounts={};
    state.players.forEach(p=>{turnCounts[p.id]=0;});
    await fbUpdate({phase:"drawing",theme,topic,roles,judgeId,drawOrder,currentTurnIndex:0,turnCounts,votes:null,voteResult:null,fakeGuess:null,fakeGuessCorrect:null,round:state.round+1});
  } else {
    await fbUpdate({phase:"lobby",theme:"",topic:"",currentTurnIndex:0});
  }
};

window.doEndGame = async function() { await fbUpdate({phase:"end"}); };

// ===== ゲーム終了 =====
function renderEnd() {
  const app = document.getElementById("app");
  const sorted=[...gameState.players].sort((a,b)=>(b.score||0)-(a.score||0));
  const winner=sorted[0];
  const isHost=gameState.players[0]?.id===playerId;
  const medals=["🥇","🥈","🥉"];
  app.innerHTML=`
    <div class="card" style="text-align:center">
      <div style="font-size:3rem">🏆</div>
      <h2 style="font-size:1.4rem;color:var(--accent2);margin-top:8px;justify-content:center">ゲーム終了！</h2>
      <div style="color:var(--text-sub);margin-bottom:20px">お疲れ様でした！</div>
      <div style="margin-bottom:24px">
        <div class="label" style="margin-bottom:10px">最終スコア</div>
        ${sorted.map((p,i)=>`<div class="score-row" style="${i===0?"border:2px solid var(--accent2);":""}margin-bottom:8px">
          <span style="font-size:1.2rem;min-width:28px">${medals[i]||""}</span>
          <div class="dot" style="background:${p.color}"></div>
          <span style="flex:1;font-weight:700;text-align:left">${esc(p.name)}${p.id===playerId?' <span style="color:var(--text-sub);font-size:0.75rem">（あなた）</span>':""}</span>
          <span style="font-size:1.3rem;font-weight:900;color:var(--accent2)">${p.score||0}</span>
        </div>`).join("")}
      </div>
      <div style="background:rgba(245,166,35,0.1);border:2px solid var(--accent2);border-radius:12px;padding:16px;margin-bottom:20px">
        <div style="font-size:1rem;color:var(--text-sub)">優勝</div>
        <div style="font-size:1.5rem;font-weight:900;color:var(--accent2);margin-top:4px">
          <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${winner?.color};margin-right:8px;vertical-align:middle"></span>
          ${esc(winner?.name||"？")}さん！
        </div>
      </div>
      ${isHost?`<button class="btn btn-primary" onclick="doRestart()">🔄 もう一度遊ぶ</button>`:`<p class="waiting">ホストがゲームをリセットするのを待っています…</p>`}
    </div>`;
}

window.doRestart = async function() {
  myVote=null;
  const state=await fbGet();
  const players=state.players.map(p=>({...p,score:0}));
  const obj={}; players.forEach((p,i)=>{obj[i]=p;});
  await fbUpdate({phase:"lobby",theme:"",topic:"",roles:null,judgeId:null,drawOrder:null,currentTurnIndex:0,turnCounts:null,strokes:null,votes:null,voteResult:null,fakeGuess:null,fakeGuessCorrect:null,round:0,players:obj});
};

// ===== 退出 =====
window.doLeave = async function() {
  if(!confirm("退出しますか？")) return;
  clearInterval(heartbeatTimer);
  if(!isSpectator) await removePlayer(playerId);
  await update(ref(db,`rooms/${currentRoom}/presence`),{[playerId]:null});
  location.reload();
};

// ===== スコア =====
function scoreCard() {
  const sorted=[...gameState.players].sort((a,b)=>(b.score||0)-(a.score||0));
  return `<div><div class="label" style="margin-bottom:6px">スコア</div>${sorted.map((p,i)=>`
    <div class="score-row">
      <span style="color:var(--text-sub);font-size:0.85rem;min-width:18px">${i+1}</span>
      <div class="dot" style="background:${p.color}"></div>
      <span style="flex:1;font-weight:700">${esc(p.name)}${p.id===playerId?' <span style="color:var(--text-sub);font-size:0.75rem">（あなた）</span>':""}</span>
      <span style="font-size:1.2rem;font-weight:900;color:var(--accent2)">${p.score||0}</span>
    </div>`).join("")}</div>`;
}

// ===== 役割オーバーレイ =====
function showRoleOverlay() {
  if(roleShown||!gameState) return; roleShown=true;
  const role=gameState.roles[playerId]; if(!role) return;
  const isFake=role==="fake";
  document.getElementById("role-card-content").innerHTML=`
    <div style="margin-bottom:14px"><div style="font-size:3rem">${isFake?"🕵️":"🎨"}</div>
    <div style="font-size:1.5rem;font-weight:900;color:${isFake?"#9b59b6":"#2ecc71"};margin-top:8px">${isFake?"ニセ絵師":"本物の絵師"}</div></div>
    <div style="margin-bottom:12px"><div class="label">テーマ</div><div class="theme-badge" style="justify-content:center">📂 ${esc(gameState.theme)}</div></div>
    <div><div class="label">お題</div><div class="${isFake?"fake-badge":"topic-badge"}" style="justify-content:center">${isFake?"✗（わかりません）":esc(gameState.topic)}</div></div>
    ${isFake?`<div style="margin-top:12px;color:#a0a8c0;font-size:0.82rem">テーマだけ手がかりにして上手く描いてバレないように！</div>`:""}`;
  document.getElementById("role-overlay").classList.add("show");
}
window.closeRoleOverlay = function() { document.getElementById("role-overlay").classList.remove("show"); };

// ===== ユーティリティ =====
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function tallyVotes(votes,players,roles){
  const counts={};players.forEach(p=>{counts[p.id]=0;});
  Object.values(votes).forEach(t=>{if(counts[t]!==undefined)counts[t]++;});
  const max=Math.max(...Object.values(counts));
  const topIds=Object.keys(counts).filter(id=>counts[id]===max);
  const fakeId=Object.keys(roles).find(id=>roles[id]==="fake");
  return{counts,maxVotes:max,topIds,fakeId,fakeIsTop:topIds.includes(fakeId)};
}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2500);
}

// ===== 起動 =====
renderApp();
</script>
